tof_node:
  ros__parameters:
    i2c_bus: 1
    gpio_chip: "gpiochip4"
    xshut_pins: [17, 27, 22, 23]
    sensor_addresses: [48, 49, 50, 51]   # 0x30, 0x31, 0x32, 0x33
    sensor_names: ["tof0", "tof1", "tof2", "tof3"]
    frame_prefix: "tof_link_"
    publish_rate_hz: 20.0
    field_of_view_rad: 0.436
    min_range_m: 0.02
    max_range_m: 2.0
    radiation_type: 1